# ============================================================
# Paper Slack Bot settings
# Normally, edit only this file.
# See the top of README.md before changing it.
# ============================================================

timezone: Asia/Tokyo

runtime:
  lookback_publication_days: 45
  pages_per_query: 2
  results_per_page: 100
  slack_pause_seconds: 1.2
  daily_target: 30

posting:
  minimum_total_score: 15
  minimum_keyword_score: 3
  maximum_tags_displayed: 12

# Journal/source scores. Add aliases when OpenAlex may use multiple names.
journal_tiers:
  tier_s:
    score: 10
    journals:
      - canonical: Nature
        aliases: [Nature]
      - canonical: Science
        aliases: [Science]
      - canonical: Nature Chemistry
        aliases: [Nature Chemistry, Nat Chem, Nat. Chem.]
      - canonical: Nature Synthesis
        aliases: [Nature Synthesis, Nat Synth, Nat. Synth.]
      - canonical: Nature Communications
        aliases: [Nature Communications, Nat Commun, Nat. Commun.]
      - canonical: Journal of the American Chemical Society
        aliases:
          - Journal of the American Chemical Society
          - J Am Chem Soc
          - J. Am. Chem. Soc.
          - JACS
      - canonical: Angewandte Chemie International Edition
        aliases:
          - Angewandte Chemie International Edition
          - Angew Chem Int Ed
          - Angew. Chem. Int. Ed.
      - canonical: Chem
        aliases: [Chem]

  tier_a:
    score: 7
    journals:
      - canonical: Proceedings of the National Academy of Sciences
        aliases:
          - Proceedings of the National Academy of Sciences
          - Proceedings of the National Academy of Sciences of the United States of America
          - PNAS
          - Proc Natl Acad Sci USA
          - Proc. Natl. Acad. Sci. U.S.A.
      - canonical: Chemical Science
        aliases: [Chemical Science, Chem Sci, Chem. Sci.]
      - canonical: Science Advances
        aliases: [Science Advances, Sci Adv, Sci. Adv.]
      - canonical: JACS Au
        aliases: [JACS Au]
      - canonical: ACS Central Science
        aliases: [ACS Central Science, ACS Cent Sci, ACS Cent. Sci.]
      - canonical: CCS Chemistry
        aliases: [CCS Chemistry, CCS Chem.]
      - canonical: National Science Review
        aliases: [National Science Review, Natl Sci Rev, Natl. Sci. Rev.]
      - canonical: ChemRxiv
        aliases: [ChemRxiv, ChemRxiv Preprints, "ChemRxiv: the preprint server for chemistry"]

  tier_b:
    score: 4
    journals:
      - canonical: Organic Letters
        aliases: [Organic Letters, Org Lett, Org. Lett.]
      - canonical: The Journal of Organic Chemistry
        aliases:
          - The Journal of Organic Chemistry
          - Journal of Organic Chemistry
          - J Org Chem
          - J. Org. Chem.
      - canonical: Chemistry – A European Journal
        aliases:
          - Chemistry – A European Journal
          - Chemistry - A European Journal
          - Chemistry—A European Journal
          - Chem Eur J
          - Chem. Eur. J.
      - canonical: Chemistry – An Asian Journal
        aliases:
          - Chemistry – An Asian Journal
          - Chemistry - An Asian Journal
          - Chemistry—An Asian Journal
          - Chem Asian J
          - Chem. Asian J.
      - canonical: Chemical Communications
        aliases: [Chemical Communications, Chem Commun, Chem. Commun.]
      - canonical: Chemistry Letters
        aliases: [Chemistry Letters, Chem Lett, Chem. Lett.]
      - canonical: European Journal of Organic Chemistry
        aliases: [European Journal of Organic Chemistry, Eur J Org Chem, Eur. J. Org. Chem.]
      - canonical: Asian Journal of Organic Chemistry
        aliases: [Asian Journal of Organic Chemistry, Asian J Org Chem, Asian J. Org. Chem.]
      - canonical: Bulletin of the Chemical Society of Japan
        aliases: [Bulletin of the Chemical Society of Japan, Bull Chem Soc Jpn, Bull. Chem. Soc. Jpn.]
      - canonical: ACS Nano
        aliases: [ACS Nano]
      - canonical: Nano Letters
        aliases: [Nano Letters, Nano Lett, Nano Lett.]
      - canonical: Advanced Materials
        aliases: [Advanced Materials, Adv Mater, Adv. Mater.]
      - canonical: Advanced Science
        aliases: [Advanced Science, Adv Sci, Adv. Sci.]
      - canonical: Small
        aliases: [Small]
      - canonical: Journal of Materials Chemistry C
        aliases: [Journal of Materials Chemistry C, J Mater Chem C, J. Mater. Chem. C]
      - canonical: Chemistry of Materials
        aliases: [Chemistry of Materials, Chem Mater, Chem. Mater.]
      - canonical: Macromolecules
        aliases: [Macromolecules]

# Positive keywords. The bot searches OpenAlex using all terms in these groups.
keywords:
  core:
    title_score: 10
    abstract_score: 5
    title_cap: 20
    abstract_cap: 15
    terms:
      - molecular nanotube
      - carbon nanotube segment
      - finite carbon nanotube
      - carbon nanobelt
      - nanobelt
      - cycloparaphenylene
      - CPP
      - nanographene
      - π-conjugated macrocycle
      - molecular nanocarbon

  strong:
    title_score: 6
    abstract_score: 3
    title_cap: 12
    abstract_cap: 9
    terms:
      - macrocycle
      - macrocyclic
      - supramolecular
      - host–guest
      - molecular cage
      - catenane
      - rotaxane
      - interlocked molecule
      - self-assembly
      - crystal packing
      - solid-state packing
      - aromaticity
      - antiaromaticity
      - open-shell
      - through-space conjugation

# Exclusion / "ドボン" keywords. Penalties are applied separately to title and abstract.
exclusion_keywords:
  title_penalty: 12
  abstract_penalty: 8
  title_cap: 24
  abstract_cap: 16
  terms:
    - peptide
    - protein
    - DNA
    - RNA
    - drug delivery
    - biomedical
    - biosensor
    - cell imaging
    - cancer
    - enzyme
    - supercapacitor
    - electrocatalysis
    - photovoltaic
    - polymer membrane

# Article-image retrieval. The bot tries metadata, page images, and finally a browser screenshot.
article_image:
  enabled: true
  request_timeout_seconds: 20
  browser_timeout_seconds: 35
  browser_wait_milliseconds: 2500
  viewport_width: 1280
  viewport_height: 900
  screenshot_fallback: true
  max_download_bytes: 10000000
  min_width: 280
  min_height: 140
  min_area: 70000
  max_output_width: 1600
  jpeg_quality: 88
  reject_url_terms:
    - logo
    - favicon
    - icon
    - avatar
    - brand
    - placeholder
    - default-image
    - journal-cover
    - cover-image
    - sprite
    - tracking
    - pixel
  reject_text_terms:
    - logo
    - favicon
    - avatar
    - advertisement
    - sponsor
    - profile
