# ============================================================
# Paper Slack Bot settings
# Normally, edit only this file.
# See the top of README.md before changing it.
# ============================================================

timezone: Asia/Tokyo

runtime:
  lookback_publication_days: 7
  pages_per_query: 2
  results_per_page: 100
  # Split broad keyword lists so common terms do not bury niche terms.
  search_terms_per_query: 10
  slack_pause_seconds: 1.2
  # Crossref lookup is attempted only when OpenAlex has no abstract and the
  # title already has at least this much keyword evidence.
  abstract_enrichment_minimum_keyword_score: 3

posting:
  minimum_score: 15
  maximum_posts_per_run: 5
  maximum_tags_displayed: 12

# Sources listed here are never posted, regardless of score. Matching ignores
# case, punctuation, and spacing. source_prefixes excludes an entire journal
# family. Add aliases for source-name variations used by OpenAlex.
excluded_sources:
  - canonical: JCIS Open
    aliases: [JCIS Open, Journal of Colloid and Interface Science Open]
  - canonical: Figshare
    aliases: [Figshare]
    doi_prefixes: [10.6084/m9.figshare.]
  - canonical: Research Square
    aliases: [Research Square]
    doi_prefixes: [10.21203/rs.]
  - canonical: arXiv
    aliases: [arXiv, arXiv (Cornell University)]
    doi_prefixes: [10.48550/arXiv.]
  - canonical: Physical Review family
    aliases: [Reviews of Modern Physics]
    source_prefixes: [Physical Review]
    doi_prefixes: [10.1103/]
  - canonical: Nature pure physics journals
    aliases: [Nature Physics, Communications Physics]
  - canonical: IOP pure physics journals
    aliases:
      - New Journal of Physics
      - Classical and Quantum Gravity
      - Reports on Progress in Physics
      - Journal of Cosmology and Astroparticle Physics
    source_prefixes: [Journal of Physics]
  - canonical: European Physical Journal family
    aliases: [European Physical Journal]
    source_prefixes: [European Physical Journal, The European Physical Journal]
  - canonical: Elsevier pure physics journals
    aliases: [Physics Reports, Annals of Physics]
    source_prefixes: [Physics Letters, Nuclear Physics]
  - canonical: Journal of High Energy Physics
    aliases: [Journal of High Energy Physics, JHEP]
  - canonical: AIP pure physics journals
    aliases:
      - Applied Physics Letters
      - Journal of Applied Physics
      - Physics of Plasmas

# Journal/source scores. Add aliases when OpenAlex may use multiple names.
journal_tiers:
  tier_s:
    score: 10
    journals:
      - canonical: Nature
        aliases: [Nature]
      - canonical: Science
        aliases: [Science]
      - canonical: Nature Chemistry
        aliases: [Nature Chemistry, Nat Chem, Nat. Chem.]
      - canonical: Nature Synthesis
        aliases: [Nature Synthesis, Nat Synth, Nat. Synth.]
      - canonical: Nature Communications
        aliases: [Nature Communications, Nat Commun, Nat. Commun.]
      - canonical: Journal of the American Chemical Society
        aliases:
          - Journal of the American Chemical Society
          - J Am Chem Soc
          - J. Am. Chem. Soc.
          - JACS
      - canonical: Angewandte Chemie International Edition
        aliases:
          - Angewandte Chemie International Edition
          - Angew Chem Int Ed
          - Angew. Chem. Int. Ed.
      - canonical: Chem
        aliases: [Chem]

  tier_a:
    score: 7
    journals:
      - canonical: Proceedings of the National Academy of Sciences
        aliases:
          - Proceedings of the National Academy of Sciences
          - Proceedings of the National Academy of Sciences of the United States of America
          - PNAS
          - Proc Natl Acad Sci USA
          - Proc. Natl. Acad. Sci. U.S.A.
      - canonical: Chemical Science
        aliases: [Chemical Science, Chem Sci, Chem. Sci.]
      - canonical: Science Advances
        aliases: [Science Advances, Sci Adv, Sci. Adv.]
      - canonical: JACS Au
        aliases: [JACS Au]
      - canonical: ACS Central Science
        aliases: [ACS Central Science, ACS Cent Sci, ACS Cent. Sci.]
      - canonical: CCS Chemistry
        aliases: [CCS Chemistry, CCS Chem.]
      - canonical: National Science Review
        aliases: [National Science Review, Natl Sci Rev, Natl. Sci. Rev.]
      - canonical: ChemRxiv
        aliases: [ChemRxiv, ChemRxiv Preprints, "ChemRxiv: the preprint server for chemistry"]

  tier_b:
    score: 4
    journals:
      - canonical: Organic Letters
        aliases: [Organic Letters, Org Lett, Org. Lett.]
      - canonical: The Journal of Organic Chemistry
        aliases:
          - The Journal of Organic Chemistry
          - Journal of Organic Chemistry
          - J Org Chem
          - J. Org. Chem.
      - canonical: Chemistry – A European Journal
        aliases:
          - Chemistry – A European Journal
          - Chemistry - A European Journal
          - Chemistry—A European Journal
          - Chem Eur J
          - Chem. Eur. J.
      - canonical: Chemistry – An Asian Journal
        aliases:
          - Chemistry – An Asian Journal
          - Chemistry - An Asian Journal
          - Chemistry—An Asian Journal
          - Chem Asian J
          - Chem. Asian J.
      - canonical: Chemical Communications
        aliases: [Chemical Communications, Chem Commun, Chem. Commun.]
      - canonical: Chemistry Letters
        aliases: [Chemistry Letters, Chem Lett, Chem. Lett.]
      - canonical: European Journal of Organic Chemistry
        aliases: [European Journal of Organic Chemistry, Eur J Org Chem, Eur. J. Org. Chem.]
      - canonical: Asian Journal of Organic Chemistry
        aliases: [Asian Journal of Organic Chemistry, Asian J Org Chem, Asian J. Org. Chem.]
      - canonical: Bulletin of the Chemical Society of Japan
        aliases: [Bulletin of the Chemical Society of Japan, Bull Chem Soc Jpn, Bull. Chem. Soc. Jpn.]
      - canonical: ACS Nano
        aliases: [ACS Nano]
      - canonical: Nano Letters
        aliases: [Nano Letters, Nano Lett, Nano Lett.]
      - canonical: Advanced Materials
        aliases: [Advanced Materials, Adv Mater, Adv. Mater.]
      - canonical: Advanced Science
        aliases: [Advanced Science, Adv Sci, Adv. Sci.]
      - canonical: Small
        aliases: [Small]
      - canonical: Journal of Materials Chemistry C
        aliases: [Journal of Materials Chemistry C, J Mater Chem C, J. Mater. Chem. C]
      - canonical: Chemistry of Materials
        aliases: [Chemistry of Materials, Chem Mater, Chem. Mater.]
      - canonical: Macromolecules
        aliases: [Macromolecules]

# Positive keywords.
# search_enabled: true  -> used both for OpenAlex retrieval and scoring.
# search_enabled: false -> used only for scoring papers retrieved by core/strong terms.
# Weak terms are deliberately scoring-only because terms such as "crystal structure"
# would otherwise generate a very large number of unrelated OpenAlex candidates.
keywords:
  core:
    search_enabled: true
    title_score: 10
    abstract_score: 5
    title_cap: 20
    abstract_cap: 15
    terms:
      - molecular nanotube
      - carbon nanotube segment
      - finite carbon nanotube
      - phenine nanotube
      - phenine
      - carbon nanobelt
      - nanobelt
      - cycloparaphenylene
      - CPP
      - nanographene
      - π-conjugated macrocycle
      - molecular nanocarbon
      - macrocycle
      - macrocyclic
      - macrocyclic ligand
      - chirality
      - chiral
      - stereogenic
      - chiroptical
      - circular dichroism
      - electronic circular dichroism
      - ECD
      - vibrational circular dichroism
      - VCD
      - circularly polarized luminescence
      - circularly polarized emission
      - CPL
      - helicity
      - helical
      - mechanical chirality
      - topological chirality
      - axial chirality
      - planar chirality
      - supramolecular chirality
      - chiral-at-metal
      - octahedral chirality
      - atropisomerism
      - chiral recognition
      - chirality transfer
      - chiral induction
      - chiral amplification
      - optical activity
      - spontaneous symmetry breaking

  strong:
    search_enabled: true
    title_score: 6
    abstract_score: 3
    title_cap: 12
    abstract_cap: 9
    terms:
      - cryptand
      - cryptate
      - crown ether
      - macrocyclic complex
      - coordination cage
      - supramolecular
      - host–guest chemistry
      - host–guest
      - molecular recognition
      - molecular cage
      - catenane
      - rotaxane
      - mechanically interlocked molecule
      - interlocked molecule
      - self-assembly
      - coordination-driven self-assembly
      - crystal packing
      - solid-state packing
      - aromaticity
      - antiaromaticity
      - open-shell
      - through-space conjugation
      - alkali metal complex
      - s-block metal complex
      - lithium complex
      - sodium complex
      - potassium complex
      - rubidium complex
      - cesium complex
      - argentophilic
      - argentophilicity
      - metallophilic
      - silver complex
      - lanthanide complex
      - lanthanide coordination complex

  weak:
    search_enabled: false
    title_score: 3
    abstract_score: 1
    title_cap: 6
    abstract_cap: 4
    terms:
      - single-crystal X-ray diffraction
      - single-crystal X-ray analysis
      - single crystal structure
      - X-ray crystallography
      - SCXRD
      - MicroED
      - electron diffraction
      - crystal structure
      - solid-state structure
      - variable-temperature NMR
      - VT NMR
      - dynamic NMR
      - conformational dynamics
      - conformational exchange
      - dynamic chirality
      - dynamic stereochemistry
      - racemization dynamics
      - stereomutation
      - excited-state dynamics
      - excited-state chirality
      - transient absorption
      - femtosecond transient absorption
      - time-resolved spectroscopy

# Exclusion / "ドボン" keywords. Penalties are applied separately to title and abstract.
exclusion_keywords:
  title_penalty: 12
  abstract_penalty: 8
  title_cap: 24
  abstract_cap: 16
  terms:
    - peptide
    - protein
    - DNA
    - RNA
    - drug delivery
    - biomedical
    - biosensor
    - cell imaging
    - cancer
    - enzyme
    - supercapacitor
    - electrocatalysis
    - photovoltaic
    - polymer membrane

# OpenAI Japanese summary settings.
ai_summary:
  enabled: true
  model: gpt-5.6-terra

  reasoning_effort: none
  fallback_reasoning_effort: low

  target_characters: 100
  minimum_characters: 85
  maximum_characters: 135

  quality_revision_attempts: 1
  request_attempts: 3
  request_timeout_seconds: 120

  max_output_tokens: 2048
  retry_max_output_tokens: 8192

  english_fallback_max_characters: 420
