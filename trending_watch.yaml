retrieval:
  publication_lookback_days: 30
  maximum_candidates: 100

posting:
  maximum_posts_per_day: 1

scope:
  journals:
    - Journal of the American Chemical Society
    - Angewandte Chemie International Edition
    - Nature Chemistry
    - Nature Synthesis
    - Organic Letters
    - The Journal of Organic Chemistry
    - Chemical Science
    - ACS Catalysis
    - Chemistry - A European Journal
    - European Journal of Organic Chemistry
    - Asian Journal of Organic Chemistry
    - Chemical Communications
    - Chem
  title_keywords:
    - organic synthesis
    - total synthesis
    - asymmetric synthesis
    - enantioselective
    - stereoselective
    - catalytic
    - catalysis
    - functionalization
    - cross-coupling
    - cyclization
    - annulation
    - photoredox
    - organocatal
    - C–H activation
    - C-H activation
  excluded_title_keywords:
    - correction
    - corrigendum
    - erratum
    - retraction
    - editorial

ranking:
  # These are transparent operational weights, not a standardized metric.
  weights:
    mentions: 5.0
    socialMedia: 4.0
    captures: 2.0
    usage: 1.0
    citations: 1.0
  daily_age_penalty: 0.04

ai_summary:
  model: gpt-5.6-sol
  reasoning_effort: none
  target_characters: 100
  minimum_characters: 85
  maximum_characters: 135
  max_output_tokens: 2048
  retry_max_output_tokens: 8192
  request_attempts: 3
  request_timeout_seconds: 90
  retry_on_invalid_japanese: true

