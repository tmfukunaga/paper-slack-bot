retrieval:
  publication_lookback_hours: 96
  maximum_candidates: 100
  timezone: Asia/Tokyo

posting:
  maximum_posts_per_day: 2

ranking:
  minimum_reader_count: 1

scope:
  dedicated_journals:
    - Nature Synthesis
    - Organic Letters
    - The Journal of Organic Chemistry
    - European Journal of Organic Chemistry
    - Asian Journal of Organic Chemistry
    - Organic Chemistry Frontiers
    - Synthesis
    - Synlett
    - Tetrahedron
    - Tetrahedron Letters
  broad_journals:
    - Journal of the American Chemical Society
    - Angewandte Chemie International Edition
    - Nature Chemistry
    - Chemical Science
    - ACS Catalysis
    - Chemistry - A European Journal
    - Chemical Communications
    - Chem
  title_keywords:
    - organic synthesis
    - total synthesis
    - asymmetric synthesis
    - enantioselective
    - stereoselective
    - regioselective
    - chemoselective
    - catalyst
    - catalytic
    - catalysis
    - functionalization
    - cross-coupling
    - coupling
    - cyclization
    - annulation
    - photoredox
    - organocatal
    - radical
    - C-H activation
    - oxidation
    - reduction
    - hydrogenation
    - borylation
    - alkylation
    - arylation
    - olefination
    - chemoenzymatic
  excluded_title_keywords:
    - correction
    - corrigendum
    - erratum
    - retraction
    - editorial

ai_summary:
  model: gpt-5.6-sol
  reasoning_effort: none
  target_characters: 100
  minimum_characters: 85
  maximum_characters: 135
  max_output_tokens: 2048
  retry_max_output_tokens: 8192
  request_attempts: 3
  request_timeout_seconds: 90
  retry_on_invalid_japanese: true
