name: Paper Watch

on:
  workflow_dispatch:
  schedule:
    # Run every three hours at :10 UTC.
    - cron: "10 */3 * * *"
  push:
    paths:
      - ".paper-watch-trigger"

concurrency:
  group: paper-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache