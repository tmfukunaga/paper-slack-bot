name: Paper Watch

on:
  workflow_dispatch:
  push:
    paths:
      - ".paper-watch-trigger"

concurrency:
  group: paper-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate configuration and run tests
        run: pytest -q

      - name: Find, summarize, and post papers
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python -m paper_watch.main

      - name: Persist state
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- data/state.json)" ]; then
            echo "No state change"
            exit 0
          fi

          git config user.name "paper-watch-bot"
          git config user.email "paper-watch-bot@users.noreply.github.com"

          git add data/state.json
          git commit -m "Update paper watch state [skip ci]"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "Push failed; rebasing state commit onto the latest main (attempt ${attempt}/3)"
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to persist state after three attempts"
          exit 1
