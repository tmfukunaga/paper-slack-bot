name: Paper Watch

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. Minute 17 avoids the busiest top-of-hour period.
    - cron: "17 */3 * * *"

concurrency:
  group: paper-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_HOME: ~/.cache/huggingface

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache translation model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-opus-mt-en-jap-v1

      - name: Install CPU PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Find and post papers
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python -m paper_watch.main

      - name: Persist state
        if: always()
        run: |
          if git diff --quiet -- data/state.json; then
            echo "No state change"
            exit 0
          fi
          git config user.name "paper-watch-bot"
          git config user.email "paper-watch-bot@users.noreply.github.com"
          git add data/state.json
          git commit -m "Update paper watch state [skip ci]"
          git push
