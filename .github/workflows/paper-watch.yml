name: Paper Watch

on:
  workflow_dispatch:
  schedule:
    # Run every three hours at :10 UTC.
    - cron: "10 */3 * * *"
  push:
    paths:
      - ".paper-watch-trigger"

concurrency:
  group: paper-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout