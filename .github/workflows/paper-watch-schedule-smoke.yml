name: Paper Watch Schedule Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: paper-watch-schedule-smoke
  cancel-in-progress: false

jobs:
  verify-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record scheduled execution
        run: |
          printf 'scheduled_at=%s\nrun_id=%s\nevent=%s\n' \
            "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            "${GITHUB_RUN_ID}" \
            "${GITHUB_EVENT_NAME}" > .paper-watch-schedule-smoke

          git config user.name "paper-watch-bot"
          git config user.email "paper-watch-bot@users.noreply.github.com"
          git add .paper-watch-schedule-smoke
          git commit -m "Record Paper Watch schedule smoke test [skip ci]"
          git push
