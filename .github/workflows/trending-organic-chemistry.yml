name: Trending Organic Chemistry

on:
  workflow_dispatch:
  # Temporary branch trigger used to validate the PlumX integration in this PR.
  push:
    branches:
      - agent/mendeley-hot-papers
  schedule:
    # 06:00 Asia/Tokyo = 21:00 UTC on the previous calendar day.
    - cron: "0 21 * * *"

concurrency:
  group: trending-organic-chemistry
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trending-watch tests
        run: pytest -q tests/test_trending_watch.py

      - name: Find and post the two daily hot papers
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m trending_watch.main
