name: Trending Organic Chemistry

on:
  # Scheduled execution is temporarily paused until ELSEVIER_API_KEY is configured.
  workflow_dispatch:

concurrency:
  group: trending-organic-chemistry
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find and post the daily trending paper
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m trending_watch.main

      - name: Persist trend snapshots and posted DOIs
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- data/trending-watch-state.json)" ]; then
            echo "No state change"
            exit 0
          fi
          git config user.name "trending-watch-bot"
          git config user.email "trending-watch-bot@users.noreply.github.com"
          git add data/trending-watch-state.json
          git commit -m "Update trending watch state [skip ci]"
          git pull --rebase origin main
          git push

